version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: tickdb-zookeeper
    ports:
      - "42181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    network_mode: "host"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: tickdb-kafka
    depends_on:
      - zookeeper
    ports:
      - "49092:49092"
      - "49093:49093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "localhost:42181"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:49092,PLAINTEXT_HOST://localhost:49092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    network_mode: "host"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tickdb-kafka-ui
    depends_on:
      - kafka
    ports:
      - "48085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: tickdb-streaming
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: localhost:49092
      KAFKA_CLUSTERS_0_ZOOKEEPER: localhost:42181
    network_mode: "host"

  prometheus:
    image: prom/prometheus:latest
    container_name: tickdb-streaming-prometheus
    ports:
      - "49090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    network_mode: "host"

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: tickdb-streaming-exporter
    ports:
      - "49308:9308"
    environment:
      - KAFKA_BROKER=localhost:49092
      - KAFKA_VERSION=3.5
    network_mode: "host"

  grafana:
    image: grafana/grafana:latest
    container_name: tickdb-streaming-grafana
    ports:
      - "43000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    network_mode: "host"

networks:
  01-docker_default:
    external: true

volumes:
  prometheus_data:
  grafana_data: