global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['localhost:49308']

  - job_name: 'kafka-jmx'
    static_configs:
      - targets: ['localhost:9999']

  - job_name: 'spark'
    static_configs:
      - targets: ['localhost:8888']